name: CI Test

on:
  push:
    branches:
      - main
    paths:
      - "i18n-scripts/**"
      - "glossary/**"
      - ".github/workflows/ci-test.yml"
  pull_request:
    paths:
      - "i18n-scripts/**"
      - "glossary/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          build-root-directory: i18n-scripts

      - name: Compile
        working-directory: i18n-scripts
        run: ./gradlew compileJava

      - name: Run Tests
        working-directory: i18n-scripts
        run: ./gradlew test

      - name: Check Formatting Placeholder
        working-directory: i18n-scripts
        run: ./gradlew check 2>/dev/null || echo "check task not configured yet — skipping"
