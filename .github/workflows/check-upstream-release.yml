name: Check Upstream Release

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at 00:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v6

      - name: Fetch Latest Ghidra Release
        id: check
        run: |
          # Query the upstream Ghidra repo for the latest release tag
          LATEST=$(gh api repos/NationalSecurityAgency/ghidra/releases/latest --jq .tag_name 2>/dev/null)

          if [ -z "$LATEST" ]; then
            echo "Failed to fetch latest release from upstream"
            echo "NEW_VERSION=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          CACHED=$(cat .ghidra-version 2>/dev/null || echo "none")

          echo "Latest upstream: $LATEST"
          echo "Cached version:  $CACHED"

          if [ "$LATEST" != "$CACHED" ]; then
            echo "NEW_VERSION=true" >> $GITHUB_OUTPUT
            echo "VERSION=$LATEST" >> $GITHUB_OUTPUT
            echo "::notice::New Ghidra version detected: $LATEST (was: $CACHED)"
          else
            echo "NEW_VERSION=false" >> $GITHUB_OUTPUT
            echo "::notice::Already at latest version: $LATEST"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Trigger I18N Pipeline
        if: steps.check.outputs.NEW_VERSION == 'true'
        run: |
          echo "Triggering i18n-pipeline.yml for version ${{ steps.check.outputs.VERSION }}"
          gh workflow run i18n-pipeline.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f upstream_tag="${{ steps.check.outputs.VERSION }}"
        env:
          GH_TOKEN: ${{ github.token }}
