# 过滤规则配置
# 定义哪些字符串应被排除出翻译候选列表

filters:

  # ============================================================
  # 1. 排除特定 Java API 调用中的字符串参数
  #    这些 API 的参数通常是日志消息、异常消息或调试信息
  # ============================================================
  exclude_apis:
    - "Msg.error"
    - "Msg.warn"
    - "Msg.info"
    - "Msg.debug"
    - "Msg.trace"
    - "Msg.showError"
    - "Msg.showWarn"
    - "Msg.showInfo"
    - "IllegalArgumentException"
    - "IllegalStateException"
    - "AssertException"
    - "Assert"
    - "Objects.requireNonNull"
    - "Preconditions.checkArgument"
    - "Preconditions.checkState"
    - "Preconditions.checkNotNull"
    - "LOG.error"
    - "LOG.warn"
    - "LOG.info"
    - "LOG.debug"
    - "LOG.trace"
    - "logger.error"
    - "logger.warn"
    - "logger.info"
    - "logger.debug"
    - "logger.trace"
    - "System.out.print"
    - "System.err.print"
    - "RuntimeException"
    - "IOException"
    - "SQLException"
    - "Console.println"

  # ============================================================
  # 2. 排除特定上下文中的字符串
  # ============================================================
  exclude_contexts:
    - "throw new"
    - "throws "
    - "import "
    - "package "
    - "class "
    - "interface "

  # ============================================================
  # 3. 正则模式排除（字符串内容匹配）
  # ============================================================
  exclude_patterns:
    # 空字符串或仅空白
    - '^\s*$'
    # 纯标点符号
    - '^[\[\]{}()/:,;.\-_+=*&^%$#@!~`<>?\\|\s''\"]+$'
    # 全大写+下划线（通常是代码常量/枚举名）
    - '^[A-Z_][A-Z0-9_]*$'
    # URL
    - '^https?:'
    - '^file:'
    - '^ftp:'
    # 以数字开头（不太可能是 UI 字符串）
    - '^\d'
    # Java package/路径模式
    - '^[a-z]+(\.[a-z]+){2,}$'
    # 纯数字
    - '^\d+$'
    # Gradle/Maven 坐标
    - '^[a-z_][a-z0-9_]*:[a-z_][a-z0-9_]*:'
    # API key / token / secret 模式
    - '^(sk-|ghp_|ghs_|github_pat_)'
    # 文件扩展名列表
    - '^\.\w+$'
    # 纯空格或制表符的缩进
    - '^[ \t]+$'

  # ============================================================
  # 4. 单字符排除
  # ============================================================
  exclude_single_chars: true

  # ============================================================
  # 5. 短字符串排除（长度小于此值的非字母字符串）
  # ============================================================
  min_meaningful_length: 2

  # ============================================================
  # 6. 文件路径排除
  #    不扫描以下路径中的文件
  # ============================================================
  exclude_file_paths:
    - "**/build/**"
    - "**/test/**"
    - "**/test.slow/**"
    - "**/.gradle/**"
    - "**/dependencies/downloads/**"
    - "**/eclipse/**"
    - "**/.launch/**"
    - "**/package.html"
    - "**/package-info.java"

  # ============================================================
  # 7. 源码调试标记排除
  #    这些是注释/测试/调试中的字符串
  # ============================================================
  exclude_debug_markers:
    - "TODO"
    - "FIXME"
    - "HACK"
    - "XXX"
    - "TEMP"
    - "DEBUG"
    - "TEST"

  # ============================================================
  # 8. 特定模块排除
  #    (暂时不翻译的模块)
  # ============================================================
  exclude_modules: []
    # - "Skeleton"      # 模板代码，非实际功能
    # - "bundle_examples" # 示例代码
